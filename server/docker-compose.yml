services:
  chess-backend:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - chess-backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
